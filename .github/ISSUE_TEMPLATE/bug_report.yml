name: Bug report
description: Something isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search [existing issues](https://github.com/lospaccabit/clipboard-archivio/issues) first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open archive with ⌘⇧V
        2. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.5.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "26.0"
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: Mac type
      options:
        - Apple Silicon
        - Intel
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output or screenshots if available.
    validations:
      required: false