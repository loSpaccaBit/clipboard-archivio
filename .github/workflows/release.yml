name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 Scripts/i18n/validate-i18n.py

  build-check:
    name: Compile check (SDK 15 fallback)
    runs-on: macos-15
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: |
          xcodebuild \
            -scheme ClipboardArchivio \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) GLASS_SDK_FALLBACK' \
            build
      - run: test -d "build/Build/Products/Release/Clipboard Archive.app"

  release-notes:
    name: GitHub Release notes
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docs/download/Clipboard-Archive.dmg
          body: |
            ## Install

            1. Download **Clipboard-Archive.dmg** from assets (or the [landing page](https://lospaccabit.github.io/clipboard-archivio/))
            2. Open the DMG → double-click **Install Clipboard Archive**, or drag the app to **Applications**
            3. Onboarding opens on first launch (right-click → Open if Gatekeeper warns)

            ## Direct download

            - DMG: https://github.com/loSpaccaBit/clipboard-archivio/releases/latest/download/Clipboard-Archive.dmg