name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Validate i18n
        run: python3 Scripts/i18n/validate-i18n.py

      - name: Build Release
        run: |
          xcodegen generate
          xcodebuild \
            -scheme ClipboardArchivio \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package installer
        run: |
          chmod +x Scripts/package-installer.sh Scripts/package-dmg.sh
          Scripts/package-installer.sh "${{ github.ref_name }}" build/Build/Products/Release/"Appunti Archivio.app"
          Scripts/package-dmg.sh "${{ github.ref_name }}" build/Build/Products/Release/"Appunti Archivio.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Appunti-Archivio.dmg
            dist/Appunti-Archivio.pkg
            dist/Appunti-Archivio-v*.dmg
            dist/Appunti-Archivio-v*.pkg
          generate_release_notes: true