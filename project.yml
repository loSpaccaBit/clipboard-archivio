name: ClipboardArchivio
options:
  bundleIdPrefix: com.clipboardarchivio
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  knownRegions:
    - en
    - it
    - de
    - fr
    - es
    - pt-BR
    - ja
    - zh-Hans
    - ko
    - nl
    - pl
    - ru
    - ar
    - tr
    - Base
settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  SWIFT_EMIT_LOC_STRINGS: YES
targets:
  ClipboardArchivio:
    type: application
    platform: macOS
    sources:
      - path: ClipboardArchivio
        excludes:
          - Resources/**
    resources:
      - path: ClipboardArchivio/Resources/AppIcon.icns
      - path: ClipboardArchivio/Resources/strings.master.json
      - path: ClipboardArchivio/Resources/Localizable.xcstrings
    postbuildScripts:
      - name: Bundle App Resources
        script: |
          APP="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app"
          DEST="${APP}/Contents/Resources"
          PLIST="${APP}/Contents/Info.plist"
          mkdir -p "${DEST}"
          cp "${SRCROOT}/Scripts/i18n/strings.master.json" "${DEST}/"
          cp "${SRCROOT}/ClipboardArchivio/Resources/AppIcon.icns" "${DEST}/"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconFile" "${PLIST}" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "${PLIST}"
        basedOnDependencyAnalysis: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipboardarchivio.app
      PRODUCT_NAME: Clipboard Archive
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_CFBundleDisplayName: Clipboard Archive
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Francesco Pio Nocerino"
      GENERATE_INFOPLIST_FILE: YES
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: ClipboardArchivio/ClipboardArchivio.entitlements
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.6.6
      LOCALIZATION_PREFERS_STRING_CATALOGS: YES